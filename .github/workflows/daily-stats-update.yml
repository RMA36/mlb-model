name: Daily Stats Update

on:
  schedule:
    # Run at 8:53 AM ET (12:53 UTC) — before the first prediction check at 9 AM
    # Statcast data for yesterday's games is usually available by ~8 AM ET
    - cron: "53 12 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "Date to process (YYYY-MM-DD). Default: yesterday"
        required: false
        type: string

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Update daily stats
        env:
          TZ: America/New_York
        run: |
          DATE="${{ github.event.inputs.date || '' }}"
          if [ -n "$DATE" ]; then
            python update_daily_stats.py --date "$DATE" --json-only
          else
            python update_daily_stats.py --json-only
          fi

      - name: Commit updated tallies and lookups
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add models/v4/tallies.json models/v4/lookups.json
          if git diff --cached --quiet; then
            echo "No stats changes to commit"
          else
            DATE=$(python -c "from datetime import datetime, timedelta; from zoneinfo import ZoneInfo; print((datetime.now(ZoneInfo('America/New_York')) - timedelta(days=1)).strftime('%Y-%m-%d'))")
            git commit -m "stats: update tallies + lookups for ${DATE}"
            git push
          fi
