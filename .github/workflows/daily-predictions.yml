name: Daily YRFI/NRFI Predictions

on:
  schedule:
    # Run twice daily to catch both afternoon and evening lineups:
    #   11:30 AM ET (15:30 UTC) — day games (lineups posted ~10-11 AM ET)
    #   4:45 PM ET (20:45 UTC) — evening games (lineups posted ~3-5 PM ET)
    - cron: "30 15 * * *"
    - cron: "45 20 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "Date override (YYYY-MM-DD)"
        required: false
        type: string

jobs:
  predict:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run predictions
        env:
          GH_TOKEN: ${{ secrets.ODDS_TRACKER_PAT }}
          TZ: America/New_York
        run: |
          DATE="${{ github.event.inputs.date || '' }}"
          if [ -n "$DATE" ]; then
            python predict.py --date "$DATE" --json-only
          else
            python predict.py --json-only
          fi

      - name: Commit predictions
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add predictions/
          if git diff --cached --quiet; then
            echo "No new predictions to commit"
          else
            DATE=$(ls -t predictions/*.json 2>/dev/null | head -1 | sed 's|predictions/||;s|\.json||' || echo "unknown")
            git commit -m "predictions: ${DATE}"
            git push
          fi
