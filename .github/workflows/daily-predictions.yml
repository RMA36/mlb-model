name: Daily YRFI/NRFI Predictions

on:
  schedule:
    # Run at 5:00 PM ET (21:00 UTC) — after lineups are posted, before evening games
    - cron: "0 21 * * *"
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/daily-predictions.yml"
    inputs:
      date:
        description: "Date override (YYYY-MM-DD)"
        required: false
        type: string

jobs:
  predict:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run predictions
        env:
          GH_TOKEN: ${{ secrets.ODDS_TRACKER_PAT }}
        run: |
          DATE="${{ github.event.inputs.date || '' }}"
          if [ -n "$DATE" ]; then
            python predict.py --date "$DATE" --json-only
          else
            python predict.py --json-only
          fi

      - name: Commit predictions
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add predictions/
          DATE=$(ls -t predictions/*.json 2>/dev/null | head -1 | xargs basename .json 2>/dev/null || echo "unknown")
          if git diff --cached --quiet; then
            echo "No new predictions to commit"
          else
            git commit -m "predictions: ${DATE}"
            git push
          fi
